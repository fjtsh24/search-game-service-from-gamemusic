name: Daily Data Import

on:
  schedule:
    # 毎日 JST 10:00（UTC 01:00）に実行
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '実行するジョブ'
        required: true
        default: 'youtube'
        type: choice
        options:
          - youtube
          - steam
          - musicbrainz
      limit:
        description: '処理件数の上限'
        required: false
        default: '100'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
  STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
  UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
  UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}

jobs:
  youtube:
    name: YouTube 動画 ID 補充
    # schedule 時 または手動で youtube を選択した場合に実行
    if: github.event_name == 'schedule' || inputs.job == 'youtube'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run YouTube import
        run: |
          LIMIT=${{ inputs.limit || '100' }}
          echo "処理件数: ${LIMIT}"
          python3 scripts/import_youtube_video_ids.py --limit "${LIMIT}"

  steam:
    name: Steam サントラ追加登録
    if: inputs.job == 'steam'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Steam import
        run: |
          LIMIT=${{ inputs.limit || '100' }}
          python3 scripts/import_steam_soundtracks.py --limit "${LIMIT}"

  musicbrainz:
    name: MusicBrainz 作曲家データ補完
    if: inputs.job == 'musicbrainz'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run MusicBrainz import
        run: |
          LIMIT=${{ inputs.limit || '50' }}
          python3 scripts/import_musicbrainz.py --limit "${LIMIT}"
