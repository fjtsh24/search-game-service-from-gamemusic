name: Daily Data Import

on:
  schedule:
    # 毎日 JST 04:00（UTC 19:00）に自動実行
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '実行するジョブ'
        required: true
        default: 'youtube'
        type: choice
        options:
          - youtube
          - steam_backfill
          - steam
          - game_tags
          - lastfm_similarities
      limit:
        description: '処理件数の上限'
        required: false
        default: '100'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
  STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
  UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
  UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}

jobs:
  # ── 毎日自動実行: 優先度順の拡充パイプライン ──────────────────────────────
  daily-enrichment:
    name: 毎日データ拡充（タグ→説明文補完→YouTube→新規追加→OST取得→類似度更新）
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Step 1 — ゲームタグ付与（40件、locked スキップ）
        run: python3 scripts/import_game_tags.py --limit 40

      - name: Step 2 — Steam 説明文バックフィル（30件）
        run: python3 scripts/import_steam_soundtracks.py --backfill --limit 30

      - name: Step 3 — YouTube VideoID 既存補完（20件、locked スキップ）
        run: python3 scripts/import_youtube_video_ids.py --limit 20

      - name: Step 4 — Steam 新規ゲーム追加（5件）
        run: python3 scripts/import_steam_soundtracks.py --limit 5

      - name: Step 5 — Steam OST appID 発見（50件、APIベース）
        run: python3 scripts/import_steam_ost_data.py --phase discover --limit 50

      - name: Step 6 — Steam OST ページ取得（10件、2分間隔）
        timeout-minutes: 30
        run: python3 scripts/import_steam_ost_data.py --phase scrape --limit 10

      - name: Step 7 — 報告済み動画の確認（要管理者レビュー）
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          db = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_ROLE_KEY"])
          rows = (
              db.table("games")
              .select("id, title, youtube_video_id")
              .eq("youtube_flagged", True)
              .execute()
              .data or []
          )
          if not rows:
              print("報告済み動画: なし")
          else:
              print(f"⚠ 報告済み動画 {len(rows)} 件（管理者確認・手動対応が必要）:")
              for r in rows:
                  title = r.get("title", "?")
                  vid = r.get("youtube_video_id", "?")
                  print(f"  - {title}: https://www.youtube.com/watch?v={vid}")
              print("\n対応後は games.youtube_flagged = FALSE に更新してください。")
          EOF

      - name: Step 8 — Last.fm 作曲家類似度更新（新規作曲家優先 30件）
        run: python3 scripts/import_lastfm_similarities.py --limit 30

  # ── 手動トリガー: 個別ジョブ ──────────────────────────────────────────────
  youtube:
    name: YouTube 動画 ID 補充（既存補完 + 新規作成）
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'youtube'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run YouTube import
        run: |
          LIMIT=${{ inputs.limit || '100' }}
          echo "処理件数: ${LIMIT}"
          python3 scripts/import_youtube_video_ids.py --limit "${LIMIT}"

  steam_backfill:
    name: Steam 説明文バックフィル（既存ゲームの欠損説明文を補完）
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'steam_backfill'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Steam backfill
        run: |
          LIMIT=${{ inputs.limit || '100' }}
          python3 scripts/import_steam_soundtracks.py --backfill --limit "${LIMIT}"

  steam:
    name: Steam サントラ追加登録
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'steam'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Steam import
        run: |
          LIMIT=${{ inputs.limit || '100' }}
          python3 scripts/import_steam_soundtracks.py --limit "${LIMIT}"

  game_tags:
    name: Last.fm ゲームタグ付与
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'game_tags'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run game tags import
        run: |
          LIMIT=${{ inputs.limit || '200' }}
          python3 scripts/import_game_tags.py --limit "${LIMIT}"

  lastfm_similarities:
    name: Last.fm 作曲家間類似度更新
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'lastfm_similarities'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Last.fm similarities import
        run: |
          LIMIT=${{ inputs.limit || '100' }}
          python3 scripts/import_lastfm_similarities.py --limit "${LIMIT}"
