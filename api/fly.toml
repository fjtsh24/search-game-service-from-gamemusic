# fly launch で生成された場合はここの app 名が自動入力される
app = "search-game-service-api"  # fly apps create でつけた名前に合わせて変更
primary_region = "nrt"           # 東京リージョン

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
